<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ── TOKENS ── */
        :root {
            --bg:      #06080f;
            --surface: rgba(255, 255, 255, 0.04);
            --border:  rgba(255, 255, 255, 0.08);
            --accent:  #00e5c8;
            --purple:  #a78bfa;
            --coral:   #ff5f6d;
            --text:    #e8eaf0;
            --dim:     rgba(232, 234, 240, 0.45);
        }

        /* ── RESET ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── BASE ── */
        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── AURORA BG ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(0, 229, 200, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 90% 20%,  rgba(167, 139, 250, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse 60% 55% at 50% 100%, rgba(255, 95, 109, 0.08) 0%, transparent 50%);
            animation: aurora 14s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
            background-size: 28px 28px;
        }

        @keyframes aurora {
            0%   { opacity: 1;   transform: scale(1);    }
            50%  { opacity: 0.8; transform: scale(1.03); }
            100% { opacity: 1;   transform: scale(1.015);}
        }

        /* ── LAYOUT WRAPPER ── */
        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 48px 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .header .eyebrow {
            font-family: 'Syne', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.9rem, 6vw, 2.6rem);
            color: var(--text);
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .header h1 em {
            font-style: normal;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── SEARCH CARD ── */
        .search-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }

        input::placeholder { color: var(--dim); }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 229, 200, 0.04);
            box-shadow: 0 0 0 3px rgba(0, 229, 200, 0.08);
        }

        #searchBtn {
            padding: 13px 22px;
            background: linear-gradient(135deg, var(--accent), #00b8a9);
            color: #06080f;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
        }

        #searchBtn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 24px rgba(0, 229, 200, 0.35);
        }

        #searchBtn:active { transform: translateY(0); }

        /* ── WEATHER RESULT CARD ── */
        .weather-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
            overflow: hidden;
            display: none;
        }

        .weather-card.visible { display: block; }

        /* top hero band */
        .weather-hero {
            padding: 32px 28px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .weather-hero .city-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .weather-hero .condition-label {
            font-size: 0.72rem;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .weather-hero .big-icon {
            font-size: 3.8rem;
            line-height: 1;
            filter: drop-shadow(0 0 16px rgba(0, 229, 200, 0.45));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0);    }
            50%       { transform: translateY(-8px); }
        }

        /* temp strip */
        .temp-strip {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .temp-value {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 3.8rem;
            color: var(--text);
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .temp-unit {
            font-size: 1.2rem;
            color: var(--dim);
            font-weight: 700;
        }

        /* stat grid */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .stat-cell {
            padding: 18px 24px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .stat-cell:nth-child(even) { border-right: none; }
        .stat-cell:nth-last-child(-n+2) { border-bottom: none; }

        .stat-cell:nth-child(1) { animation-delay: 0.05s; }
        .stat-cell:nth-child(2) { animation-delay: 0.10s; }
        .stat-cell:nth-child(3) { animation-delay: 0.15s; }
        .stat-cell:nth-child(4) { animation-delay: 0.20s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        .stat-cell .stat-label {
            font-family: 'Syne', sans-serif;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 6px;
        }

        .stat-cell .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ── SKELETON ── */
        .skeleton-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(24px);
            overflow: hidden;
            display: none;
        }

        .skeleton-card.visible { display: block; }

        .skel-band {
            height: 110px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg,
                rgba(255,255,255,0.04) 25%,
                rgba(0,229,200,0.07) 50%,
                rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.3s infinite;
        }

        .skel-temp {
            height: 80px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg,
                rgba(255,255,255,0.04) 25%,
                rgba(0,229,200,0.07) 50%,
                rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.3s 0.1s infinite;
        }

        .skel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .skel-cell {
            height: 74px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg,
                rgba(255,255,255,0.04) 25%,
                rgba(0,229,200,0.06) 50%,
                rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.3s infinite;
        }

        .skel-cell:nth-child(even) { border-right: none; }
        .skel-cell:nth-last-child(-n+2) { border-bottom: none; }
        .skel-cell:nth-child(2) { animation-delay: 0.1s; }
        .skel-cell:nth-child(3) { animation-delay: 0.2s; }
        .skel-cell:nth-child(4) { animation-delay: 0.3s; }

        @keyframes shimmer {
            0%   { background-position:  200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── HISTORY CARD ── */
        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px 20px 16px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .history-label {
            font-family: 'Syne', sans-serif;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 14px;
        }

        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history button {
            padding: 7px 15px;
            border-radius: 999px;
            background: transparent;
            color: var(--accent);
            border: 1px solid rgba(0, 229, 200, 0.28);
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .history button:hover {
            background: rgba(0, 229, 200, 0.10);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 229, 200, 0.2);
        }

        .history p {
            color: var(--dim);
            font-size: 0.75rem;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,229,200,0.25); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="page">

        <!-- HEADER -->
        <div class="header">
            <p class="eyebrow">Real-time data</p>
            <h1>Weather<br><em>Tracker</em></h1>
        </div>

        <!-- SEARCH -->
        <div class="search-card">
            <div class="input-group">
                <input id="cityInput" placeholder="Enter city — Delhi, Paris…">
                <button id="searchBtn">Go</button>
            </div>
        </div>

        <!-- SKELETON -->
        <div class="skeleton-card" id="skeleton">
            <div class="skel-band"></div>
            <div class="skel-temp"></div>
            <div class="skel-grid">
                <div class="skel-cell"></div>
                <div class="skel-cell"></div>
                <div class="skel-cell"></div>
                <div class="skel-cell"></div>
            </div>
        </div>

        <!-- WEATHER RESULT -->
        <div class="weather-card" id="weatherCard">
            <div class="weather-hero">
                <div>
                    <div class="city-name" id="cityName"></div>
                    <div class="condition-label" id="conditionLabel"></div>
                </div>
                <div class="big-icon" id="bigIcon"></div>
            </div>
            <div class="temp-strip">
                <span class="temp-value" id="tempValue"></span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="stat-grid">
                <div class="stat-cell">
                    <div class="stat-label">Humidity</div>
                    <div class="stat-value" id="humidity"></div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Wind</div>
                    <div class="stat-value" id="wind"></div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Feels Like</div>
                    <div class="stat-value" id="feelsLike"></div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Pressure</div>
                    <div class="stat-value" id="pressure"></div>
                </div>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="history-card">
            <div class="history-label">Recent Searches</div>
            <div class="history" id="history"></div>
        </div>

    </div>

    <script>
        const API_KEY = "7f45d9f973f4a7b3581f9dcdf2f238bb";

        const skeleton   = document.getElementById("skeleton");
        const weatherCard = document.getElementById("weatherCard");
        const historyBox = document.getElementById("history");

        const weatherIcons = {
            Clear: "☀️", Clouds: "☁️", Rain: "🌧️", Drizzle: "🌦️",
            Thunderstorm: "⛈️", Snow: "❄️", Mist: "🌫️", Fog: "🌫️",
            Haze: "🌁", Smoke: "💨", Dust: "🌪️", Tornado: "🌪️"
        };

        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("City not found");
                throw new Error("City not found");
            }
            return res.json();
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        function renderWeather(d) {
            const cond = d.weather[0].main;

            document.getElementById("cityName").textContent    = `${d.name}, ${d.sys.country}`;
            document.getElementById("conditionLabel").textContent = d.weather[0].description;
            document.getElementById("bigIcon").textContent     = weatherIcons[cond] || "🌡️";
            document.getElementById("tempValue").textContent   = Math.round(d.main.temp);
            document.getElementById("humidity").textContent    = d.main.humidity + "%";
            document.getElementById("wind").textContent        = d.wind.speed + " m/s";
            document.getElementById("feelsLike").textContent   = Math.round(d.main.feels_like) + "°C";
            document.getElementById("pressure").textContent    = d.main.pressure + " hPa";

            skeleton.classList.remove("visible");
            weatherCard.classList.add("visible");
        }

        function saveHistory(city) {
            const history = JSON.parse(localStorage.getItem("weatherHistory") || "[]");
            if (!history.map(c => c.toLowerCase()).includes(city.toLowerCase())) {
                history.unshift(city);
                if (history.length > 10) history.pop();
                localStorage.setItem("weatherHistory", JSON.stringify(history));
            }
            showHistory();
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem("weatherHistory") || "[]");
            historyBox.innerHTML = history.length
                ? history.map(city => `<button onclick="search('${city}')">${city}</button>`).join("")
                : "<p>No searches yet.</p>";
        }

        async function search(city) {
            weatherCard.classList.remove("visible");
            skeleton.classList.add("visible");
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
            } catch (e) {
                skeleton.classList.remove("visible");
            }
        }

        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        showHistory();
    </script>
</body>
</html>
