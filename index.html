<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #06080f;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00e5c8;
            --accent2: #ff5f6d;
            --accent3: #a78bfa;
            --text: #e8eaf0;
            --text-dim: rgba(232, 234, 240, 0.45);
            --glow: 0 0 40px rgba(0, 229, 200, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg);
            padding: 32px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── ANIMATED AURORA BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0, 229, 200, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 85% 15%, rgba(167, 139, 250, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse 50% 60% at 60% 90%, rgba(255, 95, 109, 0.07) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: auroraShift 12s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes auroraShift {
            0%   { opacity: 1; transform: scale(1)   rotate(0deg); }
            50%  { opacity: 0.8; transform: scale(1.04) rotate(0.5deg); }
            100% { opacity: 1; transform: scale(1.02) rotate(-0.3deg); }
        }

        .container {
            max-width: 1100px;
            margin: auto;
            position: relative;
            z-index: 1;
        }

        /* ── HEADING ── */
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            text-align: center;
            color: var(--text);
            margin-bottom: 36px;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        h1 span {
            background: linear-gradient(90deg, var(--accent), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        /* ── LAYOUT ── */
        .parent-card {
            display: flex;
            gap: 18px;
        }

        /* ── GLASS CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 18px;
            width: 100%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 229, 200, 0.18);
            box-shadow: 0 0 60px rgba(0, 229, 200, 0.10), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* ── INPUT GROUP ── */
        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }

        input::placeholder { color: var(--text-dim); }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 229, 200, 0.04);
            box-shadow: 0 0 0 3px rgba(0, 229, 200, 0.08);
        }

        button {
            padding: 12px 22px;
            background: linear-gradient(135deg, var(--accent), #00b8a9);
            color: #06080f;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 24px rgba(0, 229, 200, 0.3);
        }

        button:active { transform: translateY(0); }

        /* ── WEATHER ITEMS ── */
        #weather {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            transition: background 0.2s, transform 0.2s;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .weather-item:hover {
            background: rgba(0, 229, 200, 0.05);
            transform: translateX(4px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .weather-item:nth-child(1) { animation-delay: 0.00s; }
        .weather-item:nth-child(2) { animation-delay: 0.06s; }
        .weather-item:nth-child(3) { animation-delay: 0.12s; }
        .weather-item:nth-child(4) { animation-delay: 0.18s; }
        .weather-item:nth-child(5) { animation-delay: 0.24s; }

        .weather-item label {
            font-family: 'Syne', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .weather-item span {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 700;
        }

        /* ── CONSOLE ── */
        .console {
            background: rgba(0,0,0,0.6);
            color: var(--accent);
            padding: 18px;
            border-radius: 14px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .log.async   { border-left: 2px solid var(--accent);  padding-left: 8px; }
        .log.promise { border-left: 2px solid var(--accent2); padding-left: 8px; }
        .log.callback{ border-left: 2px solid var(--accent3); padding-left: 8px; }

        /* ── HISTORY BUTTONS ── */
        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history button {
            margin: 0;
            padding: 7px 14px;
            border-radius: 999px;
            background: transparent;
            color: var(--accent);
            border: 1px solid rgba(0, 229, 200, 0.3);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .history button:hover {
            background: rgba(0, 229, 200, 0.12);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 229, 200, 0.2);
            filter: none;
        }

        .history p {
            color: var(--text-dim);
            font-size: 0.78rem;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,229,200,0.25); border-radius: 4px; }

        @media (max-width: 700px) {
            .parent-card { flex-direction: column; }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 <span>Async</span> Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>
        const API_KEY = "7f45d9f973f4a7b3581f9dcdf2f238bb";
        //    const API_KEY = "af9f63c59a649f27d602b96a43d0bd14";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

         /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            const history=JSON.parse(localStorage.getItem("weatherHistory")||"[]");
            if (!history.map(c=>c.toLowerCase()).includes(city.toLowerCase())){
                history.unshift(city);
                if(history.length > 10) history.pop();
                localStorage.setItem("weatherHistory",JSON.stringify(history));
            }
            showHistory();
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            const history = JSON.parse(localStorage.getItem("weatherHistory")||"[]");
            historyBox.innerHTML=history.length
            ? history.map(city=>`<button onclick="search('${city}')">${city}</button>`).join("")
            :"<p>No History yet.</p>";
           
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
       
        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
